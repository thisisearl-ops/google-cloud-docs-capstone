<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Google Cloud Docs Capstone</title>
    <script>
      // GitHub Pages SPA redirect trick
      // Encodes the path as a query string and redirects to index.html
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname.split("/").slice(0, 1 + 1).join("/") +
          "/?p=/" +
          l.pathname.slice(1).split("/").slice(1).join("/").replace(/&/g, "~and~") +
          (l.search ? "&q=" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
</html>
